# MobileSeal Xcode project definition (GOAL WS A.2, Codex advisory 8).
# The project is GENERATED by xcodegen from this file and CHECKED IN —
# `Scripts/generate-project.sh` regenerates it; commit both together.
# Personal team/signing lives in Configs/Local.xcconfig (gitignored;
# optionally included by Configs/Shared.xcconfig) so shared project
# settings never carry a developer identity.
name: MobileSeal
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.38.0"

configFiles:
  Debug: Configs/Shared.xcconfig
  Release: Configs/Shared.xcconfig

packages:
  VaultCore:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    CODE_SIGN_STYLE: Automatic

targets:
  MobileSeal:
    type: application
    platform: iOS
    sources:
      - path: App/MobileSeal
      # Share-inbox protocol (CED-15 WS B): compiled into BOTH the app
      # and the extension — the writer/store/manifest are one library,
      # unit-tested through the app target.
      - path: App/ShareInbox
      # Committed fixture images ride the app bundle for the scripted
      # e2e gate (UI-test launch mode imports them through the fixture
      # provider seam). ~1 MiB of tiny JPEG/HEIC.
      - path: App/Fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - package: VaultCore
        product: VaultCore
      # Share extension (CED-15 WS B.3): embedded into PlugIns/.
      - target: MobileSealShare
    # App-group custody (CED-15 WS B.3, Codex B7/B11): the group
    # container carries the extension→app inbox; entitlements on BOTH
    # targets. Signed two-App-ID install feasibility is the stated
    # HITL residual — simulator proves functionality.
    entitlements:
      path: App/MobileSeal/MobileSeal.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.gmail.cedric.hurst.mobileseal
    info:
      path: App/MobileSeal/Info.plist
      properties:
        CFBundleDisplayName: MobileSeal
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        # Single-scene policy (GOAL WS A.1): iOS never creates a
        # second scene of this app.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gmail.cedric.hurst.mobileseal
        PRODUCT_NAME: MobileSeal
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic

  MobileSealShare:
    type: app-extension
    platform: iOS
    sources:
      - path: App/MobileSealShare
      - path: App/ShareInbox
    dependencies:
      # VaultCore for MediaHashing (BLAKE2b manifests) ONLY — the
      # extension never unlocks and never runs the KDF (120 MB limit;
      # see research/_default/argon2id-tuning-on-modern-iphones.md).
      - package: VaultCore
        product: VaultCore
    entitlements:
      path: App/MobileSealShare/MobileSealShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.gmail.cedric.hurst.mobileseal
    info:
      path: App/MobileSealShare/Info.plist
      properties:
        CFBundleDisplayName: MobileSeal
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: ShareViewController
          NSExtensionAttributes:
            # Media UTIs only (CED-15 WS B.1): images and movies, no
            # web pages, text, or arbitrary files (files-types fog).
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 50
              NSExtensionActivationSupportsMovieWithMaxCount: 50
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gmail.cedric.hurst.mobileseal.share
        PRODUCT_NAME: MobileSealShare
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false

  MobileSealTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: App/MobileSealTests
      - path: App/Fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - target: MobileSeal
      - package: VaultCore
        product: VaultCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gmail.cedric.hurst.mobileseal.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MobileSeal.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MobileSeal"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: true

  MobileSealUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: App/MobileSealUITests
    dependencies:
      - target: MobileSeal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gmail.cedric.hurst.mobileseal.uitests
        TEST_TARGET_NAME: MobileSeal
        GENERATE_INFOPLIST_FILE: true

schemes:
  MobileSeal:
    build:
      targets:
        MobileSeal: all
        MobileSealTests: [test]
        MobileSealUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - MobileSealTests
        - MobileSealUITests
    archive:
      config: Release
