# MobileSeal Xcode project definition (GOAL WS A.2, Codex advisory 8).
# The project is GENERATED by xcodegen from this file and CHECKED IN —
# `Scripts/generate-project.sh` regenerates it; commit both together.
# Personal team/signing lives in Configs/Local.xcconfig (gitignored;
# optionally included by Configs/Shared.xcconfig) so shared project
# settings never carry a developer identity.
name: MobileSeal
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.38.0"

configFiles:
  Debug: Configs/Shared.xcconfig
  Release: Configs/Shared.xcconfig

packages:
  VaultCore:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    CODE_SIGN_STYLE: Automatic

targets:
  MobileSeal:
    type: application
    platform: iOS
    sources:
      - path: App/MobileSeal
      # Committed fixture images ride the app bundle for the scripted
      # e2e gate (UI-test launch mode imports them through the fixture
      # provider seam). ~1 MiB of tiny JPEG/HEIC.
      - path: App/Fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - package: VaultCore
        product: VaultCore
    info:
      path: App/MobileSeal/Info.plist
      properties:
        CFBundleDisplayName: MobileSeal
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        # Single-scene policy (GOAL WS A.1): iOS never creates a
        # second scene of this app.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gmail.cedric.hurst.mobileseal
        PRODUCT_NAME: MobileSeal
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic

  MobileSealTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: App/MobileSealTests
      - path: App/Fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - target: MobileSeal
      - package: VaultCore
        product: VaultCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gmail.cedric.hurst.mobileseal.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MobileSeal.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MobileSeal"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: true

  MobileSealUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: App/MobileSealUITests
    dependencies:
      - target: MobileSeal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gmail.cedric.hurst.mobileseal.uitests
        TEST_TARGET_NAME: MobileSeal
        GENERATE_INFOPLIST_FILE: true

schemes:
  MobileSeal:
    build:
      targets:
        MobileSeal: all
        MobileSealTests: [test]
        MobileSealUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - MobileSealTests
        - MobileSealUITests
    archive:
      config: Release
